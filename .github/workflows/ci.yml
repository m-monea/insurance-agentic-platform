name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - customer-service
          - claim-service
          - ai-agent-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build ${{ matrix.service }}
        working-directory: ./${{ matrix.service }}
        run: mvn clean verify

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend-angular

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build

  docker:

    runs-on: ubuntu-latest

    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Compose
        run: docker compose config

      - name: Build AI Agent image
        run: docker build -t ai-agent-service ./ai-agent-service

      - name: Build Claim Service image
        run: docker build -t claim-service ./claim-service

      - name: Build Customer Service image
        run: docker build -t customer-service ./customer-service

      - name: Build Frontend image
        run: docker build -t frontend-angular ./frontend-angular