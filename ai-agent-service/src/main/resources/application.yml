server:
  port: ${PORT:8083}

servizi:
  claim-url: ${CLAIM_SERVICE_URL:https://insurance-claim-service.onrender.com}
  customer-url: ${CUSTOMER_SERVICE_URL:https://insurance-customer-service.onrender.com}

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  model: ${OLLAMA_MODEL:llama3.2}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/insurance_db}
    username: ${SPRING_DATASOURCE_USERNAME:insurance_user}
    password: ${SPRING_DATASOURCE_PASSWORD:insurance_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false