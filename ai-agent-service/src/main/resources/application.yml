server:
  port: 8083

servizi:
  claim-url: ${CLAIM_SERVICE_URL:http://localhost:8081}
  customer-url: ${CUSTOMER_SERVICE_URL:http://localhost:8082}

ollama:
  url: ${OLLAMA_URL:http://host.docker.internal:11434}
  model: ${OLLAMA_MODEL:llama3.2}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/insurance}
    username: ${SPRING_DATASOURCE_USERNAME:insurance}
    password: ${SPRING_DATASOURCE_PASSWORD:insurance}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false